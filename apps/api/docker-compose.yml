services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://fullbloom:fullbloom@db:5432/fullbloom
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fullbloom
      POSTGRES_PASSWORD: fullbloom
      POSTGRES_DB: fullbloom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullbloom"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
